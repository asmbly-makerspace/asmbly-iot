esphome:
  name: fan-speed-3dp-enclosure

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Configure the output on pin 0
output:
  - platform: ledc
    pin: GPIO0
    id: fan_0
    frequency: 15kHz

# Set it up to appear in HA as a fan
fan:
  - platform: speed
    output: fan_0
    name: "3DP Enclosure Filter Fan"
    restore_mode: RESTORE_DEFAULT_ON  # if the device is restarted, try to restore the previous setting
